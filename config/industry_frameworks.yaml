  invalidation_focus:
  - 营收增速下滑
  - 毛利率恶化
  - 订单或客户资本开支低于预期
  - 估值无法被业绩消化
  common_mistakes:
  - 用低PE价值框架分析高景气股
  - 忽略客户集中度
  - 把题材热度当成订单兑现
  confidence_penalty_missing_fields:
  - revenue_yoy
  - net_profit_yoy
  - gross_margin
  - valuation_metrics
semiconductor_cycle:
  display_name: 半导体国产替代/周期股
  description: 适用于半导体设备、芯片、晶圆、存储、国产替代相关公司。
