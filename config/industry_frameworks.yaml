  - 把机器人概念当成已经兑现的主营收入
  - 忽略传统主业和新业务占比差异
  - 只看特斯拉或机器人预期，不看财务兑现
  - 用纯题材股逻辑分析制造业龙头
  confidence_penalty_missing_fields:
  - financial_metrics
  - business_composition
  - gross_margin
  - operating_cashflow
  - accounts_receivable
satellite_communication_infrastructure:
  display_name: 卫星通信基础设施
  description: 适用于以在轨卫星、轨位、频段、转发器等空间段资产为核心稀缺资源，以带宽、转发器和卫星通信服务变现为主要收入来源的资产密集、牌照/资源驱动、长周期运营型公司。
  required_focus:
  - 卫星资源和轨位 / 频段资源
  - 转发器 / 带宽容量
  - 容量利用率 / 出租率
  - 单位带宽价格
  - 客户结构和合同期限
  - 广电、海洋、航空、应急、政府 / 央企客户
  - 资产寿命和折旧压力
  - capex / 卫星发射周期
  - 应收账款和回款质量
  - 合同负债作为订单可见度 proxy
  - 经营现金流稳定性
  - 商业航天新业务兑现
  - 政策和牌照壁垒
  must_track_indicators:
  - 在轨卫星数量
  - 转发器 / 带宽容量
  - 容量利用率 / 出租率
  - 单位带宽价格
  - 卫星剩余寿命
  - 合同期限结构
  - 客户集中度
  - 合同负债
  - 应收账款
  - capex
  - 折旧摊销
  - 经营现金流
  - 毛利率
  - 商业航天新业务收入
  - 重大卫星发射 / 故障 / 保险事件
  - EV/EBITDA
  - EBITDA margin
  - 自由现金流
  - 债务 / EBITDA
  key_risks:
  - 容量利用率 / 出租率缺失导致资源利用判断不足
  - 客户结构和合同期限缺失导致需求稳定性判断不足
  - 卫星寿命、折旧政策和发射周期影响利润与现金流
  - 合同负债仅为订单可见度 proxy，不等同真实 backlog
  - capex 仅代表长期资产购建现金支出，不等同新增容量确定释放
  - 商业航天主题、政策热度或新闻热度不等同业绩兑现
  - 卫星故障、保险索赔或资产减值可能显著影响资产质量
  preferred_metrics:
  - revenue
  - net_profit
  - gross_margin
  - operating_cashflow
  - accounts_receivable
  - contract_liabilities
  - capex
  - valuation_metrics
  invalidation_focus:
  - 容量利用率或出租率恶化
  - 关键客户或合同期限结构恶化
  - 卫星剩余寿命、折旧或发射计划出现重大不确定性
  - 经营现金流与利润背离
  - 应收账款和回款质量恶化
  - 商业航天新业务缺少收入和现金流兑现
  - 发生重大卫星发射、故障、保险或减值事件
  common_mistakes:
  - 把商业航天主题当成业绩兑现
  - 把合同负债当成 backlog
  - 用 PE/PB/PS 单独判断估值
  - 忽略卫星寿命 / 折旧 / 发射周期
  - 缺容量利用率时断言资源利用充分
  - 缺客户结构时断言需求稳定
  confidence_penalty_missing_fields:
  - capacity_utilization_or_lease_rate
  - transponder_or_bandwidth_capacity
  - unit_bandwidth_price
  - customer_structure_or_concentration
  - satellite_design_or_remaining_life
  - depreciation_amortization
  - satellite_launch_plan
  - satellite_failure_or_insurance_event
low_altitude_economy_infrastructure:
  display_name: "Low-altitude economy infrastructure / operation service"
  description: "Applies to companies whose core business is low-altitude flight operation, general aviation operation service, low-altitude airspace control/dispatch, ground support, city-level low-altitude operation platform, or takeoff/landing/base/route/platform service, and whose business can be verified by revenue, contracts, customers, assets, operating volume, or project acceptance evidence."
  required_focus:
  - "sub_type routing: aviation_operations_service vs airspace_platform_system"
  - "low-altitude/general-aviation/airspace revenue share"
  - "fleet size, aircraft type mix, fleet age, operating hours, flight sorties"
  - "contract amount, backlog-like disclosures, project acceptance, customer structure, collection cycle"
  - "takeoff/landing sites, bases, routes, coverage areas"
  - "operating qualification, airspace resources, safety events and regulatory penalties"
  - "low-altitude business gross margin and operating cashflow"
  - "policy pilot to commercial order evidence and policy dependence"
  must_track_indicators:
  - "low-altitude revenue share"
  - "accounts receivable"
  - "contract liabilities"
  - "operating cashflow"
  - "low-altitude business gross margin"
  - "customer structure"
  - "policy pilot to commercial order evidence"
  - "safety events / accidents / regulatory penalties"
  - "fleet size"
  - "aircraft type mix"
  - "fleet average age"
  - "operating hours"
  - "flight sorties"
  - "revenue per flight hour"
  - "depreciation and amortization"
  - "EBITDA / EBITDA margin as future_data_needed only"
  - "operating qualification / airspace resources"
  - "takeoff/landing sites / bases / route resources"
  - "contract amount on hand"
  - "contract delivery cycle"
  - "project acceptance progress"
  - "platform dispatch volume"
  - "software service revenue share"
  - "R&D expense ratio"
  - "customer renewal rate"
  - "government project dependence"
  - "project collection cycle"
  key_risks:
  - "Low-altitude theme is not business realization evidence."
  - "Policy pilots and demonstration zones are not commercial revenue."
  - "Strategic cooperation and intent orders are not contract revenue."
  - "Contract liabilities are only a visibility proxy and not real backlog."
  - "Drone/eVTOL OEM and component companies must not be routed here."
  - "Missing operating hours, flight sorties, platform dispatch, customers, acceptance or collection data caps confidence."
  - "Safety accidents, CAAC penalties, route suspension and airspace control are major operating risks."
  - "Government project dependence may reduce revenue stability and collection quality."
  preferred_metrics:
  - revenue
  - net_profit
  - gross_margin
  - operating_cashflow
  - accounts_receivable
  - contract_liabilities
  - business_composition
  - valuation_metrics
  invalidation_focus:
  - "Low-altitude/general-aviation/airspace revenue share cannot be confirmed."
  - "Core operations/airspace platform evidence is absent."
  - "Customer structure, acceptance, collection, safety or regulatory evidence worsens."
  - "Traditional manufacturing/core business dominates the revenue mix."
  common_mistakes:
  - "Treating low-altitude theme as business realization."
  - "Treating policy pilot or demonstration zone as commercial revenue."
  - "Treating strategic cooperation or intent order as contract revenue."
  - "Treating contract liabilities as backlog."
  - "Routing drone/eVTOL OEM or aviation components into infrastructure operation."
  - "Using aviation operation metrics to assess an airspace platform company."
  - "Using platform contract metrics to assess an aviation operation company."
  - "Letting resource_swing, semiconductor_cycle, or advanced_manufacturing_growth catch low-altitude theme contamination."
  confidence_penalty_missing_fields:
  - low_altitude.revenue_share
  - low_altitude.fleet_size
  - low_altitude.operating_hours
  - low_altitude.flight_sorties
  - low_altitude.contract_amount
  - low_altitude.project_acceptance_progress
  - low_altitude.customer_structure
  - low_altitude.collection_cycle
  - low_altitude.safety_or_regulatory_event
life_science_cxo_services:
  display_name: "Life-science CXO services"
  description: "Applies to companies whose revenue mainly comes from CRO/CDMO/CXO/CMC/clinical research or pharmaceutical R&D-production outsourcing services. The core drivers are outsourced R&D/manufacturing demand, order visibility, customer structure, utilization, delivery, compliance, overseas regulatory exposure and geopolitical risk, not self-owned drug pipeline success."
  required_focus:
  - "CXO/CRO/CDMO/CMC/clinical-research outsourcing revenue share and sub_type routing"
  - "backlog and new signed orders, with contract liabilities treated only as partial_proxy"
  - "customer concentration, major-customer change, overseas revenue, North America/U.S. exposure and customer geography"
  - "CDMO capacity utilization, commercial projects, capacity expansion and capex/capacity matching"
  - "clinical project count, clinical trial/SMO/data-statistics service revenue, acceptance progress and collection cycle"
  - "GMP/FDA/NMPA compliance, Biosecure Act/sanction/geopolitical risk and FX impact"
  - "one-off large-order distortion and talent/scientist retention risk"
  must_track_indicators:
  - "CXO/CRO/CDMO related revenue share"
  - "backlog / on-hand orders"
  - "new signed orders"
  - "contract liabilities partial_proxy"
  - "customer concentration"
  - "overseas revenue share"
  - "North America / U.S. revenue share"
  - "gross margin"
  - "operating cashflow"
  - "accounts receivable"
  - "collection cycle"
  - "capex"
  - "FX impact"
  - "overseas regulatory / geopolitical / Biosecure Act / sanction risk"
  - "project cancellation or delay"
  - "one-off large-order marker"
  - "business-segment revenue mix"
  - "active customers / major-customer change"
  - "employee count / scientist count / personnel efficiency future_data_needed"
  - "CDMO orders / capacity utilization / commercial project count"
  - "GMP/FDA/NMPA compliance event"
  - "clinical project count / acceptance progress / collection cycle"
  key_risks:
  - "CXO concept wording is not order recovery evidence."
  - "Contract liabilities are partial_proxy only and are not real backlog."
  - "Capex is capacity input evidence only and is not capacity absorption or future order realization."
  - "R&D expense ratio is R&D intensity only and is not technology-moat confirmation."
  - "Revenue growth is not direct evidence of order-trend improvement."
  - "Missing customer concentration prevents stable-demand claims."
  - "Missing overseas/U.S. exposure prevents downplaying overseas regulatory, geopolitical, Biosecure Act and sanction risk."
  - "Missing CDMO utilization prevents capacity-absorption claims."
  - "Missing clinical project count/progress prevents clinical-CRO prosperity claims."
  - "Talent/scientist loss, one-off large orders, GMP/FDA/NMPA events and FX effects must be explicit risk guards."
  preferred_metrics:
  - revenue
  - net_profit
  - gross_margin
  - operating_cashflow
  - accounts_receivable
  - contract_liabilities
  - r_and_d_expense_ratio
  - capex
  - business_composition
  - valuation_metrics
  invalidation_focus:
  - "CXO/CRO/CDMO revenue share cannot be confirmed or falls below threshold."
  - "Backlog/new orders/customer structure/overseas exposure remain missing or deteriorate."
  - "CDMO capacity utilization, commercial projects, compliance or large-customer concentration deteriorate."
  - "Clinical project count, acceptance progress, cancellation/delay or collection quality deteriorates."
  - "Ordinary API/formulation manufacturing, device, distribution, TCM, consumer healthcare, software or self-owned pipeline becomes dominant."
  common_mistakes:
  - "Treating CXO concept as order recovery."
  - "Treating contract liabilities as backlog."
  - "Treating capex as capacity absorption."
  - "Treating R&D expense ratio as technology moat confirmation."
  - "Treating revenue growth directly as order improvement."
  - "Routing self-owned drug-pipeline companies into CXO."
  - "Routing ordinary pharma manufacturing companies into CXO."
  - "Ignoring overseas regulation, geopolitics, Biosecure Act, sanctions or FX impact."
  - "Ignoring one-off large-order revenue-base distortion."
  confidence_penalty_missing_fields:
  - life_science_cxo.cxo_revenue_share
  - life_science_cxo.backlog
  - life_science_cxo.new_signed_orders
  - life_science_cxo.customer_concentration
  - life_science_cxo.overseas_revenue_share
  - life_science_cxo.north_america_or_us_revenue_share
  - life_science_cxo.cdmo_capacity_utilization
  - life_science_cxo.clinical_project_count
  - life_science_cxo.project_cancellation_or_delay
  - life_science_cxo.collection_cycle
  - life_science_cxo.geopolitical_regulatory_risk
  - life_science_cxo.one_off_large_order_risk
  - life_science_cxo.gmp_fda_nmpa_compliance_event
ai_datacenter_infrastructure:
  display_name: "AI datacenter infrastructure"
  description: "Applies to IDC/AIDC operation, datacenter power/UPS/distribution, and datacenter cooling/liquid-cooling infrastructure companies whose business can be verified by revenue, orders, customers, assets, cabinets/MW, delivery or operating indicators. It is not a generic AI compute-chain or theme framework."
  required_focus:
  - "sub_type routing: datacenter_operator vs power_ups_infrastructure vs cooling_liquid_cooling_infrastructure"
  - "AI datacenter related revenue share and business composition"
  - "datacenter customer revenue share, customer concentration, orders/contracts and delivery cycle"
  - "revenue, profit, gross margin, operating cashflow, accounts receivable, contract liabilities, capex and valuation"
  - "contract liabilities as partial_proxy only, not real backlog"
  - "capex as capacity/infrastructure input observation only, not revenue certainty"
  - "customer capex cycle as demand context only, not company revenue certainty"
  - "sub_type-specific operating indicators without proxy calculation in v1"
  must_track_indicators:
  - "AI datacenter related revenue share"
  - "datacenter customer revenue share"
  - "major-customer concentration"
  - "orders / backlog, usually missing / future_data_needed"
  - "contract liabilities partial_proxy"
  - "delivery cycle"
  - "gross margin"
  - "operating cashflow"
  - "accounts receivable"
  - "inventory"
  - "capex"
  - "capex conversion cycle"
  - "construction-in-progress amount and expected completion time"
  - "historical capex-to-revenue conversion efficiency"
  - "customer capital-expenditure cycle"
  - "price-competition risk"
  - "cabinet count"
  - "MW scale"
  - "rack-up rate / utilization"
  - "PUE"
  - "average electricity price"
  - "power cost / revenue"
  - "revenue per MW"
  - "revenue per cabinet"
  - "customer contract term"
  - "depreciation and amortization"
  - "EBITDA / EBITDA margin as future_data_needed only"
  - "energy policy / power quota"
  - "datacenter power / UPS revenue share"
  - "UPS / distribution orders"
  - "storage / photovoltaic revenue share"
  - "project acceptance and collection cycle"
  - "datacenter cooling revenue share"
  - "liquid-cooling revenue share"
  - "liquid-cooling technology route"
  - "liquid-cooling certification stage"
  - "liquid-cooling customer validation"
  - "liquid-cooling batch orders"
  - "ordinary HVAC / industrial thermal-control revenue share"
  key_risks:
  - "AI datacenter theme exposure is not order realization."
  - "Customer capex expectations are not company revenue certainty."
  - "Contract liabilities are partial_proxy only and are not real backlog."
  - "Capex is capacity/infrastructure input evidence only and is not guaranteed capacity release or revenue."
  - "IDC operator metrics and equipment-supplier metrics must not be mixed."
  - "Power/UPS and storage/photovoltaic businesses must not be mixed."
  - "Liquid cooling / precision thermal control and ordinary industrial HVAC must not be mixed."
  - "PCB, optical modules, servers and chips must not be routed into this infrastructure framework."
  - "Customer certification or POC testing is not a batch order."
  - "Missing rack-up rate, PUE or utilization prevents datacenter operating-efficiency claims."
  - "Missing liquid-cooling revenue and customer validation prevents liquid-cooling scale-up claims."
  - "Missing customer structure and orders prevents claims of sufficient business realization."
  - "Power quota, energy policy and project approval risk must be explicit."
  - "IDC depreciation policy affects profit comparison; do not rely only on net margin."
  - "Major-customer concentration and order-cut risk must be explicit."
  preferred_metrics:
  - revenue
  - net_profit
  - gross_margin
  - operating_cashflow
  - accounts_receivable
  - contract_liabilities
  - capex
  - inventory
  - business_composition
  - valuation_metrics
  invalidation_focus:
  - "Datacenter revenue share, orders, customers, assets, delivery or operating evidence cannot be confirmed."
  - "Power/UPS revenue cannot be separated from storage/photovoltaic revenue."
  - "Datacenter cooling or liquid-cooling revenue/customer/order validation remains missing."
  - "Rack-up rate, PUE, utilization, customer term, energy quota or depreciation evidence remains missing for operators."
  - "Receivables and operating cashflow diverge from revenue recognition."
  common_mistakes:
  - "Treating AI datacenter theme as order realization."
  - "Treating customer capex expectations as company revenue certainty."
  - "Treating contract liabilities as backlog."
  - "Treating capex as confirmed capacity release or confirmed future revenue."
  - "Mixing IDC operator indicators with equipment supplier indicators."
  - "Mixing datacenter UPS/power with storage or photovoltaic business."
  - "Mixing liquid cooling / precision thermal control with ordinary industrial HVAC."
  - "Routing PCB, optical modules, servers or chips into this infrastructure framework."
  - "Treating customer certification or POC testing as batch orders."
  - "Calculating rack-up, utilization, PUE, liquid-cooling revenue share or backlog proxies in v1."
  confidence_penalty_missing_fields:
  - ai_datacenter.revenue_share
  - ai_datacenter.customer_revenue_share
  - ai_datacenter.customer_concentration
  - ai_datacenter.orders_or_backlog
  - ai_datacenter.delivery_cycle
  - ai_datacenter.customer_capex_cycle
  - ai_datacenter.cabinet_count
  - ai_datacenter.mw_scale
  - ai_datacenter.rack_up_or_utilization
  - ai_datacenter.pue
  - ai_datacenter.power_quota_energy_policy
  - ai_datacenter.customer_contract_term
  - financial_metrics.depreciation_amortization
  - ai_datacenter.power_ups_revenue_share
  - ai_datacenter.power_ups_orders
  - ai_datacenter.storage_pv_revenue_share
  - ai_datacenter.cooling_revenue_share
  - ai_datacenter.liquid_cooling_revenue_share
  - ai_datacenter.liquid_cooling_customer_validation
  - ai_datacenter.liquid_cooling_batch_orders
  - ai_datacenter.ordinary_hvac_revenue_share
unknown:
  display_name: 未知类型
  description: 数据不足或无法稳定归类。
  required_focus:
  - 补充行业和主营数据
  - 补充财务数据
  - 补充业务构成
  must_track_indicators:
  - 行业
  - 主营业务
  - 财务摘要
  key_risks:
  - 数据不足
  - 分类错误
  preferred_metrics: []
  invalidation_focus:
  - 数据仍无法补充
  common_mistakes:
  - 在分类不明时强行分析
  confidence_penalty_missing_fields:
  - industry
  - main_business
  - financial_metrics
