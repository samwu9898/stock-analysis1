resource_swing:
  display_name: 资源弹性股
  description: 适用于利润对商品价格、产量释放、周期波动高度敏感的有色/贵金属/稀土公司。
  required_focus:
  - 商品价格趋势
  - 产量与资源储量
  - 成本曲线
  - 毛利率弹性
  - 一次性收益识别
  - 周期顶部风险
  must_track_indicators:
  - 对应商品价格
  - 季度产量
  - 毛利率
  - 扣非净利润
  - 经营现金流
  - 美元指数
  key_risks:
  - 商品价格快速回落
  - 利润高度依赖周期
  - 一次性收益误导
  - 高位资本开支
  - 海外矿山或政策风险
  preferred_metrics:
  - revenue_yoy
  - net_profit_yoy
  - deducted_net_profit
  - gross_margin
  - operating_cashflow
  invalidation_focus:
  - 商品价格趋势反转
  - 产量释放不及预期
  - 扣非利润明显弱于归母利润
  - 现金流与利润背离
  common_mistakes:
  - 把商品涨价带来的周期利润当成永久成长
  - 忽略一次性收益
  - 只看PE不看商品周期
  confidence_penalty_missing_fields:
  - financial_metrics
  - business_composition
  - gross_margin
  - operating_cashflow
resource_core:
  display_name: 资源核心底仓
  description: 适用于多矿种布局、资源储量大、现金流和分红能力较强的大型资源龙头。
  required_focus:
  - 多矿种资源布局
  - 储量与产量
  - 经营现金流
  - 资本开支
  - 分红能力
  - 商品价格组合
  must_track_indicators:
  - 铜价
  - 金价
  - 产量
  - 经营现金流
  - 资产负债率
  - 分红率
  key_risks:
  - 大宗商品系统性下跌
  - 海外项目风险
  - 资本开支过大
  - 成本上升
  preferred_metrics:
  - operating_cashflow
  - debt_to_asset
  - roe
  - net_profit_yoy
  - dividend_yield
  invalidation_focus:
  - 商品价格组合走弱
  - 现金流恶化
  - 资本开支失控
  common_mistakes:
  - 用小资源股弹性要求资源龙头
  - 只看短期涨幅忽略长期资源价值
  confidence_penalty_missing_fields:
  - financial_metrics
  - operating_cashflow
  - debt_to_asset
  - business_composition
right_trend_growth:
  display_name: 高景气趋势成长股
  description: 适用于AI算力、光模块、PCB、服务器、液冷等高景气成长方向。
  required_focus:
  - 行业景气度
  - 订单增长
  - 大客户资本开支
  - 收入增速
  - 毛利率趋势
  - 估值消化能力
  must_track_indicators:
  - 营收增速
  - 净利润增速
  - 毛利率
  - 客户集中度
  - 订单或产能
  - 行业资本开支
  key_risks:
  - 高估值回撤
  - 客户集中度过高
  - 订单不及预期
  - 毛利率下滑
  - 技术路线变化
  preferred_metrics:
  - revenue_yoy
  - net_profit_yoy
  - gross_margin
  - roe
  - valuation_metrics
  invalidation_focus:
  - 营收增速下滑
  - 毛利率恶化
  - 订单或客户资本开支低于预期
  - 估值无法被业绩消化
  common_mistakes:
  - 用低PE价值框架分析高景气股
  - 忽略客户集中度
  - 把题材热度当成订单兑现
  confidence_penalty_missing_fields:
  - revenue_yoy
  - net_profit_yoy
  - gross_margin
  - valuation_metrics
semiconductor_cycle:
  display_name: 半导体国产替代/周期股
  description: 适用于半导体设备、芯片、晶圆、存储、国产替代相关公司。
  required_focus:
  - 国产替代逻辑
  - 订单与在手订单
  - 研发投入
  - 存货周期
  - 毛利率波动
  - 资本开支周期
  must_track_indicators:
  - 营收增速
  - 毛利率
  - 存货
  - 研发费用率
  - 订单
  - 行业资本开支
  key_risks:
  - 估值波动大
  - 研发投入无法商业化
  - 存货周期恶化
  - 下游资本开支下行
  - 外部限制变化
  preferred_metrics:
  - revenue_yoy
  - gross_margin
  - inventory
  - roe
  - valuation_metrics
  invalidation_focus:
  - 订单下滑
  - 存货大幅增加
  - 毛利率下降
  - 国产替代进展不及预期
  common_mistakes:
  - 只看国产替代叙事不看订单
  - 忽略半导体周期性
  - 把研发投入等同于商业成功
  confidence_penalty_missing_fields:
  - financial_metrics
  - inventory
  - gross_margin
  - business_composition
stable_growth:
  display_name: 稳健成长股
  description: 适用于电网设备、电力自动化、订单稳定、现金流相对稳健的公司。
  required_focus:
  - 订单稳定性
  - 现金流质量
  - ROE
  - 资产负债率
  - 政策投资周期
  - 海外订单
  must_track_indicators:
  - 新签订单
  - 经营现金流
  - ROE
  - 资产负债率
  - 毛利率
  - 分红能力
  key_risks:
  - 订单低于预期
  - 毛利率下滑
  - 应收账款增加
  - 政策投资节奏放缓
  preferred_metrics:
  - operating_cashflow
  - roe
  - gross_margin
  - debt_to_asset
  - revenue_yoy
  invalidation_focus:
  - 现金流恶化
  - 订单下滑
  - ROE持续下降
  - 应收账款压力上升
  common_mistakes:
  - 用题材股弹性要求稳健成长股
  - 忽略现金流和订单质量
  confidence_penalty_missing_fields:
  - operating_cashflow
  - roe
  - debt_to_asset
  - accounts_receivable
theme_only:
  display_name: 题材属性股
  description: 适用于基本面支撑弱、主要依赖题材或新闻催化的公司。
  required_focus:
  - 题材与主营相关性
  - 财务质量
  - 利润兑现路径
  - 新闻真实性
  - 风险暴露
  must_track_indicators:
  - 主营业务相关性
  - 扣非净利润
  - 经营现金流
  - 毛利率
  - 公告验证
  key_risks:
  - 题材无法兑现
  - 财务质量弱
  - 主营不相关
  - 高位情绪退潮
  preferred_metrics:
  - deducted_net_profit
  - operating_cashflow
  - revenue_yoy
  - gross_margin
  invalidation_focus:
  - 题材与主营无关
  - 无订单或业绩验证
  - 财务质量继续恶化
  common_mistakes:
  - 把题材新闻当成基本面
  - 只看短期热度
  - 忽略业绩兑现
  confidence_penalty_missing_fields:
  - financial_metrics
  - business_composition
  - operating_cashflow
advanced_manufacturing_growth:
  display_name: 高端制造成长股
  description: 适用于汽车热管理、机器人执行器、工业自动化、精密制造核心零部件、新能源车供应链等高端制造成长公司。
  required_focus:
  - 主营业务真实构成
  - 汽车热管理或机器人业务占比
  - 订单和客户验证
  - 大客户依赖
  - 毛利率趋势
  - 研发投入和产品迭代
  - 海外收入和汇率影响
  - 估值是否提前反映成长预期
  must_track_indicators:
  - 营收增速
  - 净利润增速
  - 毛利率
  - 经营现金流
  - 研发费用率
  - 应收账款
  - 大客户收入占比
  - 汽车热管理业务收入
  - 机器人相关业务收入或订单
  key_risks:
  - 机器人业务兑现慢于预期
  - 大客户依赖较高
  - 毛利率下滑
  - 新业务收入占比过低
  - 估值提前透支预期
  - 海外需求或汇率波动
  preferred_metrics:
  - revenue_yoy
  - net_profit_yoy
  - gross_margin
  - operating_cashflow
  - roe
  - accounts_receivable
  invalidation_focus:
  - 营收或利润增速明显放缓
  - 毛利率持续下滑
  - 机器人或新业务没有订单和收入验证
  - 经营现金流与利润背离
  - 大客户需求低于预期
  common_mistakes:
  - 把机器人概念当成已经兑现的主营收入
  - 忽略传统主业和新业务占比差异
  - 只看特斯拉或机器人预期，不看财务兑现
  - 用纯题材股逻辑分析制造业龙头
  confidence_penalty_missing_fields:
  - financial_metrics
  - business_composition
  - gross_margin
  - operating_cashflow
  - accounts_receivable
satellite_communication_infrastructure:
  display_name: 卫星通信基础设施
  description: 适用于以在轨卫星、轨位、频段、转发器等空间段资产为核心稀缺资源，以带宽、转发器和卫星通信服务变现为主要收入来源的资产密集、牌照/资源驱动、长周期运营型公司。
  required_focus:
  - 卫星资源和轨位 / 频段资源
  - 转发器 / 带宽容量
  - 容量利用率 / 出租率
  - 单位带宽价格
  - 客户结构和合同期限
  - 广电、海洋、航空、应急、政府 / 央企客户
  - 资产寿命和折旧压力
  - capex / 卫星发射周期
  - 应收账款和回款质量
  - 合同负债作为订单可见度 proxy
  - 经营现金流稳定性
  - 商业航天新业务兑现
  - 政策和牌照壁垒
  must_track_indicators:
  - 在轨卫星数量
  - 转发器 / 带宽容量
  - 容量利用率 / 出租率
  - 单位带宽价格
  - 卫星剩余寿命
  - 合同期限结构
  - 客户集中度
  - 合同负债
  - 应收账款
  - capex
  - 折旧摊销
  - 经营现金流
  - 毛利率
  - 商业航天新业务收入
  - 重大卫星发射 / 故障 / 保险事件
  - EV/EBITDA
  - EBITDA margin
  - 自由现金流
  - 债务 / EBITDA
  key_risks:
  - 容量利用率 / 出租率缺失导致资源利用判断不足
  - 客户结构和合同期限缺失导致需求稳定性判断不足
  - 卫星寿命、折旧政策和发射周期影响利润与现金流
  - 合同负债仅为订单可见度 proxy，不等同真实 backlog
  - capex 仅代表长期资产购建现金支出，不等同新增容量确定释放
  - 商业航天主题、政策热度或新闻热度不等同业绩兑现
  - 卫星故障、保险索赔或资产减值可能显著影响资产质量
  preferred_metrics:
  - revenue
  - net_profit
  - gross_margin
  - operating_cashflow
  - accounts_receivable
  - contract_liabilities
  - capex
  - valuation_metrics
  invalidation_focus:
  - 容量利用率或出租率恶化
  - 关键客户或合同期限结构恶化
  - 卫星剩余寿命、折旧或发射计划出现重大不确定性
  - 经营现金流与利润背离
  - 应收账款和回款质量恶化
  - 商业航天新业务缺少收入和现金流兑现
  - 发生重大卫星发射、故障、保险或减值事件
  common_mistakes:
  - 把商业航天主题当成业绩兑现
  - 把合同负债当成 backlog
  - 用 PE/PB/PS 单独判断估值
  - 忽略卫星寿命 / 折旧 / 发射周期
  - 缺容量利用率时断言资源利用充分
  - 缺客户结构时断言需求稳定
  confidence_penalty_missing_fields:
  - capacity_utilization_or_lease_rate
  - transponder_or_bandwidth_capacity
  - unit_bandwidth_price
  - customer_structure_or_concentration
  - satellite_design_or_remaining_life
  - depreciation_amortization
  - satellite_launch_plan
  - satellite_failure_or_insurance_event
low_altitude_economy_infrastructure:
  display_name: "Low-altitude economy infrastructure / operation service"
  description: "Applies to companies whose core business is low-altitude flight operation, general aviation operation service, low-altitude airspace control/dispatch, ground support, city-level low-altitude operation platform, or takeoff/landing/base/route/platform service, and whose business can be verified by revenue, contracts, customers, assets, operating volume, or project acceptance evidence."
  required_focus:
  - "sub_type routing: aviation_operations_service vs airspace_platform_system"
  - "low-altitude/general-aviation/airspace revenue share"
  - "fleet size, aircraft type mix, fleet age, operating hours, flight sorties"
  - "contract amount, backlog-like disclosures, project acceptance, customer structure, collection cycle"
  - "takeoff/landing sites, bases, routes, coverage areas"
  - "operating qualification, airspace resources, safety events and regulatory penalties"
  - "low-altitude business gross margin and operating cashflow"
  - "policy pilot to commercial order evidence and policy dependence"
  must_track_indicators:
  - "low-altitude revenue share"
  - "accounts receivable"
  - "contract liabilities"
  - "operating cashflow"
  - "low-altitude business gross margin"
  - "customer structure"
  - "policy pilot to commercial order evidence"
  - "safety events / accidents / regulatory penalties"
  - "fleet size"
  - "aircraft type mix"
  - "fleet average age"
  - "operating hours"
  - "flight sorties"
  - "revenue per flight hour"
  - "depreciation and amortization"
  - "EBITDA / EBITDA margin as future_data_needed only"
  - "operating qualification / airspace resources"
  - "takeoff/landing sites / bases / route resources"
  - "contract amount on hand"
  - "contract delivery cycle"
  - "project acceptance progress"
  - "platform dispatch volume"
  - "software service revenue share"
  - "R&D expense ratio"
  - "customer renewal rate"
  - "government project dependence"
  - "project collection cycle"
  key_risks:
  - "Low-altitude theme is not business realization evidence."
  - "Policy pilots and demonstration zones are not commercial revenue."
  - "Strategic cooperation and intent orders are not contract revenue."
  - "Contract liabilities are only a visibility proxy and not real backlog."
  - "Drone/eVTOL OEM and component companies must not be routed here."
  - "Missing operating hours, flight sorties, platform dispatch, customers, acceptance or collection data caps confidence."
  - "Safety accidents, CAAC penalties, route suspension and airspace control are major operating risks."
  - "Government project dependence may reduce revenue stability and collection quality."
  preferred_metrics:
  - revenue
  - net_profit
  - gross_margin
  - operating_cashflow
  - accounts_receivable
  - contract_liabilities
  - business_composition
  - valuation_metrics
  invalidation_focus:
  - "Low-altitude/general-aviation/airspace revenue share cannot be confirmed."
  - "Core operations/airspace platform evidence is absent."
  - "Customer structure, acceptance, collection, safety or regulatory evidence worsens."
  - "Traditional manufacturing/core business dominates the revenue mix."
  common_mistakes:
  - "Treating low-altitude theme as business realization."
  - "Treating policy pilot or demonstration zone as commercial revenue."
  - "Treating strategic cooperation or intent order as contract revenue."
  - "Treating contract liabilities as backlog."
  - "Routing drone/eVTOL OEM or aviation components into infrastructure operation."
  - "Using aviation operation metrics to assess an airspace platform company."
  - "Using platform contract metrics to assess an aviation operation company."
  - "Letting resource_swing, semiconductor_cycle, or advanced_manufacturing_growth catch low-altitude theme contamination."
  confidence_penalty_missing_fields:
  - low_altitude.revenue_share
  - low_altitude.fleet_size
  - low_altitude.operating_hours
  - low_altitude.flight_sorties
  - low_altitude.contract_amount
  - low_altitude.project_acceptance_progress
  - low_altitude.customer_structure
  - low_altitude.collection_cycle
  - low_altitude.safety_or_regulatory_event
unknown:
  display_name: 未知类型
  description: 数据不足或无法稳定归类。
  required_focus:
  - 补充行业和主营数据
  - 补充财务数据
  - 补充业务构成
  must_track_indicators:
  - 行业
  - 主营业务
  - 财务摘要
  key_risks:
  - 数据不足
  - 分类错误
  preferred_metrics: []
  invalidation_focus:
  - 数据仍无法补充
  common_mistakes:
  - 在分类不明时强行分析
  confidence_penalty_missing_fields:
  - industry
  - main_business
  - financial_metrics
