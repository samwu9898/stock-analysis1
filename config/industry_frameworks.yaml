theme_only:
  display_name: 题材属性股
  description: 适用于基本面支撑弱、主要依赖题材或新闻催化的公司。
  required_focus:
  - 题材与主营相关性
  - 财务质量
  - 利润兑现路径
  - 新闻真实性
  - 风险暴露
  must_track_indicators:
  - 主营业务相关性
  - 扣非净利润
  - 经营现金流
  - 毛利率
  - 公告验证
  key_risks:
  - 题材无法兑现
  - 财务质量弱
  - 主营不相关
  - 高位情绪退潮
  preferred_metrics:
  - deducted_net_profit
  - operating_cashflow
  - revenue_yoy
  - gross_margin
  invalidation_focus:
  - 题材与主营无关
  - 无订单或业绩验证
  - 财务质量继续恶化
  common_mistakes:
  - 把题材新闻当成基本面
  - 只看短期热度
  - 忽略业绩兑现
