  - 研发投入
  - 存货周期
  - 毛利率波动
  - 资本开支周期
  must_track_indicators:
  - 营收增速
  - 毛利率
  - 存货
  - 研发费用率
  - 订单
  - 行业资本开支
  key_risks:
  - 估值波动大
  - 研发投入无法商业化
  - 存货周期恶化
  - 下游资本开支下行
