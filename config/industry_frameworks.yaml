  - gross_margin
  - business_composition
stable_growth:
  display_name: 稳健成长股
  description: 适用于电网设备、电力自动化、订单稳定、现金流相对稳健的公司。
  required_focus:
  - 订单稳定性
  - 现金流质量
  - ROE
  - 资产负债率
  - 政策投资周期
  - 海外订单
  must_track_indicators:
  - 新签订单
  - 经营现金流
  - ROE
  - 资产负债率
  - 毛利率
  - 分红能力
  key_risks:
  - 订单低于预期
  - 毛利率下滑
  - 应收账款增加
  - 政策投资节奏放缓
  preferred_metrics:
  - operating_cashflow
  - roe
  - gross_margin
  - debt_to_asset
  - revenue_yoy
  invalidation_focus:
  - 现金流恶化
  - 订单下滑
  - ROE持续下降
  - 应收账款压力上升
  common_mistakes:
