resource_swing:
  display_name: 资源弹性股
  description: 适用于利润对商品价格、产量释放、周期波动高度敏感的有色/贵金属/稀土公司。
  required_focus:
  - 商品价格趋势
  - 产量与资源储量
  - 成本曲线
  - 毛利率弹性
  - 一次性收益识别
  - 周期顶部风险
  must_track_indicators:
  - 对应商品价格
  - 季度产量
  - 毛利率
  - 扣非净利润
  - 经营现金流
  - 美元指数
  key_risks:
  - 商品价格快速回落
  - 利润高度依赖周期
  - 一次性收益误导
  - 高位资本开支
  - 海外矿山或政策风险
  preferred_metrics:
  - revenue_yoy
  - net_profit_yoy
  - deducted_net_profit
  - gross_margin
  - operating_cashflow
  invalidation_focus:
  - 商品价格趋势反转
  - 产量释放不及预期
  - 扣非利润明显弱于归母利润
  - 现金流与利润背离
  common_mistakes:
  - 把商品涨价带来的周期利润当成永久成长
  - 忽略一次性收益
  - 只看PE不看商品周期
  confidence_penalty_missing_fields:
  - financial_metrics
  - business_composition
  - gross_margin
  - operating_cashflow
resource_core:
  display_name: 资源核心底仓
  description: 适用于多矿种布局、资源储量大、现金流和分红能力较强的大型资源龙头。
  required_focus:
  - 多矿种资源布局
  - 储量与产量
  - 经营现金流
  - 资本开支
  - 分红能力
  - 商品价格组合
  must_track_indicators:
  - 铜价
  - 金价
  - 产量
  - 经营现金流
  - 资产负债率
  - 分红率
  key_risks:
  - 大宗商品系统性下跌
  - 海外项目风险
  - 资本开支过大
  - 成本上升
  preferred_metrics:
  - operating_cashflow
  - debt_to_asset
  - roe
  - net_profit_yoy
  - dividend_yield
  invalidation_focus:
  - 商品价格组合走弱
  - 现金流恶化
  - 资本开支失控
  common_mistakes:
  - 用小资源股弹性要求资源龙头
  - 只看短期涨幅忽略长期资源价值
  confidence_penalty_missing_fields:
  - financial_metrics
  - operating_cashflow
  - debt_to_asset
  - business_composition
right_trend_growth:
  display_name: 高景气趋势成长股
  description: 适用于AI算力、光模块、PCB、服务器、液冷等高景气成长方向。
  required_focus:
  - 行业景气度
  - 订单增长
  - 大客户资本开支
  - 收入增速
  - 毛利率趋势
  - 估值消化能力
  must_track_indicators:
  - 营收增速
  - 净利润增速
  - 毛利率
  - 客户集中度
  - 订单或产能
  - 行业资本开支
  key_risks:
  - 高估值回撤
  - 客户集中度过高
  - 订单不及预期
  - 毛利率下滑
  - 技术路线变化
  preferred_metrics:
  - revenue_yoy
