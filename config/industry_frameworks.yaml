  - operating_cashflow
advanced_manufacturing_growth:
  display_name: 高端制造成长股
  description: 适用于汽车热管理、机器人执行器、工业自动化、精密制造核心零部件、新能源车供应链等高端制造成长公司。
  required_focus:
  - 主营业务真实构成
  - 汽车热管理或机器人业务占比
  - 订单和客户验证
  - 大客户依赖
  - 毛利率趋势
  - 研发投入和产品迭代
  - 海外收入和汇率影响
  - 估值是否提前反映成长预期
  must_track_indicators:
  - 营收增速
  - 净利润增速
  - 毛利率
  - 经营现金流
  - 研发费用率
  - 应收账款
  - 大客户收入占比
  - 汽车热管理业务收入
  - 机器人相关业务收入或订单
  key_risks:
  - 机器人业务兑现慢于预期
  - 大客户依赖较高
  - 毛利率下滑
  - 新业务收入占比过低
  - 估值提前透支预期
  - 海外需求或汇率波动
