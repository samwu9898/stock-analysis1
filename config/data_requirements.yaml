resource_swing:
  required_fields:
  - field_name: financial_metrics.revenue_yoy
    display_name: 营收增速
    category: financial
    importance: high
    reason: 判断资源价格上涨是否转化为收入增长
    expected_location:
    - financial_metrics
    affects_analysis:
    - financial_quality
    - industry_cycle
  - field_name: financial_metrics.net_profit_yoy
    display_name: 净利润增速
    category: financial
    importance: high
    reason: 判断利润弹性
    expected_location:
    - financial_metrics
    affects_analysis:
    - financial_quality
  - field_name: financial_metrics.deducted_net_profit
    display_name: 扣非净利润
    category: financial
    importance: critical
    reason: 识别利润是否来自一次性收益
    expected_location:
    - financial_metrics
    affects_analysis:
    - financial_quality
    - risk_flags
  - field_name: financial_metrics.gross_margin
    display_name: 毛利率
    category: financial
    importance: critical
    reason: 判断商品价格变化是否改善盈利质量
    expected_location:
    - financial_metrics
    affects_analysis:
    - financial_quality
    - industry_cycle
  - field_name: financial_metrics.operating_cashflow
    display_name: 经营现金流
    category: financial
    importance: critical
    reason: 判断利润质量
    expected_location:
    - financial_metrics
    affects_analysis:
    - financial_quality
    - risk_flags
  - field_name: business_composition.segments
    display_name: 主营业务构成
    category: business_composition
    importance: critical
    reason: 判断公司到底暴露于哪些资源品种
    expected_location:
    - business_composition.segments
    affects_analysis:
    - business_summary
    - key_drivers
    - industry_cycle
  - field_name: external.commodity_prices
    display_name: 相关商品价格
    category: external_variable
    importance: high
    reason: 资源股利润对商品价格高度敏感
    expected_location:
    - external.commodity_prices
    affects_analysis:
    - industry_cycle
    - catalysts
