    importance: high
    reason: 判断基础经营规模
    expected_location:
    - financial_metrics.revenue
    affects_analysis:
    - financial_quality
  - field_name: financial_metrics.net_profit
    display_name: 利润
    category: financial
    importance: high
    reason: 判断基础盈利结果
    expected_location:
    - financial_metrics.net_profit
    affects_analysis:
    - financial_quality
  - field_name: financial_metrics.gross_margin
    display_name: 毛利率
