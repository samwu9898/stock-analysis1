    importance: critical
    reason: 判断收入结构是否支持卫星传输服务或卫星通信服务框架；该字段不能单独证明容量利用率或客户需求稳定
    expected_location:
    - business_composition.segments
    affects_analysis:
    - business_summary
    - key_drivers
    - industry_cycle
